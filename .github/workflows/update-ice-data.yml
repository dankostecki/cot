name: Update ICE COT Data

on:
  # Co piątek o 22:00 czasu polskiego (dwa crony bo GitHub Actions = UTC)
  # Zimą (CET = UTC+1): 22:00 PL = 21:00 UTC
  # Latem (CEST = UTC+2): 22:00 PL = 20:00 UTC
  # Skrypt jest idempotentny — podwójne uruchomienie nic nie psuje
  schedule:
    - cron: '0 21 * * 5'
    - cron: '0 20 * * 5'
  # Możliwość ręcznego uruchomienia z panelu GitHub Actions
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run ICE data update script
        run: python .github/scripts/update_ice_data.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ice/
          git diff --cached --quiet \
            && echo "Brak zmian w danych ICE." \
            || (git commit -m "chore: update ICE COT data [skip ci]" && git push)
